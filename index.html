<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --primary: #4a90e2;
      --bg: #f5f7fb;
      --card: #ffffff;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: var(--card);
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      color: var(--primary);
    }

    .input-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      flex: 1;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .add-btn { background: var(--primary); color: white; }
    .complete { background: #28a745; color: white; }
    .edit { background: #ffc107; }
    .delete { background: #dc3545; color: white; }

    .task {
      display: flex;
      justify-content: space-between;
      background: #eee;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .task.completed {
      opacity: 0.6;
      text-decoration: line-through;
    }

    .overdue {
      color: red;
      font-weight: bold;
    }

    .actions button {
      margin-left: 5px;
    }

    .filters {
      text-align: center;
      margin-bottom: 15px;
    }

    /* MODAL */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
    }

    .modal-content input {
      width: 100%;
      margin-bottom: 10px;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      .task {
        flex-direction: column;
      }

      .actions {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
      }

      input, button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Task Manager</h1>

  <div class="input-group">
    <input id="taskInput" placeholder="Enter task">
    <input type="datetime-local" id="dueDateInput">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <div class="filters">
    <button onclick="loadTasks('all')">All</button>
    <button onclick="loadTasks('completed')">Completed</button>
    <button onclick="loadTasks('pending')">Pending</button>
  </div>

  <div id="taskList"></div>
</div>

<!-- ✨ MODAL -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <h3>Edit Task</h3>
    <input id="editTaskInput">
    <input type="datetime-local" id="editDateInput">
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<script>
const API = "http://127.0.0.1:3000";

let currentEditId = null;

async function addTask() {
  const task = document.getElementById("taskInput").value;
  const dueDate = document.getElementById("dueDateInput").value;

  if (!task) return alert("Enter a task");

  await fetch(API + "/add-task", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ task, dueDate })
  });

  document.getElementById("taskInput").value = "";
  document.getElementById("dueDateInput").value = "";

  loadTasks();
}

async function completeTask(id) {
  await fetch(API + "/complete-task/" + id, { method: "PUT" });
  loadTasks();
}

async function deleteTask(id) {
  await fetch(API + "/delete-task/" + id, { method: "DELETE" });
  loadTasks();
}

// OPEN MODAL
function openEditModal(id, task, dueDate) {
  currentEditId = id;
  document.getElementById("editTaskInput").value = task;
  document.getElementById("editDateInput").value = dueDate || "";
  document.getElementById("editModal").style.display = "flex";
}

// CLOSE MODAL
function closeModal() {
  document.getElementById("editModal").style.display = "none";
}

// SAVE EDIT
async function saveEdit() {
  const task = document.getElementById("editTaskInput").value;
  const dueDate = document.getElementById("editDateInput").value;

  await fetch(API + "/edit-task/" + currentEditId, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ task, dueDate })
  });

  closeModal();
  loadTasks();
}

async function loadTasks(filter = "all") {
  const res = await fetch(API + "/tasks");
  let tasks = await res.json();

  if (filter === "completed") tasks = tasks.filter(t => t.completed);
  if (filter === "pending") tasks = tasks.filter(t => !t.completed);

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.forEach(t => {
    const isOverdue =
      t.dueDate &&
      new Date(t.dueDate) < new Date() &&
      !t.completed;

    const div = document.createElement("div");
    div.className = `task ${t.completed ? 'completed' : ''}`;

    div.innerHTML = `
      <div>
        <div class="${isOverdue ? 'overdue' : ''}">${t.task}</div>
        <small>
          ${t.dueDate ? new Date(t.dueDate).toLocaleString() : ""}
          ${isOverdue ? " ⚠️ Overdue!" : ""}
        </small>
      </div>

      <div class="actions">
        <button class="complete" onclick="completeTask('${t.taskid}')">✔</button>
        <button class="edit" onclick="openEditModal('${t.taskid}', '${t.task}', '${t.dueDate || ""}')">✏️</button>
        <button class="delete" onclick="deleteTask('${t.taskid}')">🗑</button>
      </div>
    `;

    list.appendChild(div);
  });
}

loadTasks();
</script>

</body>
</html>
